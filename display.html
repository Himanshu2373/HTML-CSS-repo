<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        display: block;
        border: 2px solid red;
        margin: 5px;
        width: 200px;
      }
      .box1 {
        border: 2px solid red;
        margin: 5px;
        display: inline;
      }
      .box2 {
        border: 2px solid red;
        margin: 5px;
        height: 100px;
        display: inline-block;
      }
      div {
        border: 2px solid blue;
        display: inline-block;
        width: 100px;
        height: 100px;
        margin: 15px;
        padding: 15px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>tutorial of display properties</h1>

    <h2>display - block</h2>

    <div class="box">
      <p>Himanshu (block)</p>
    </div>

    <div class="box">
      <p>Himanshu (block)</p>
    </div>

    <div class="box">
      <p>Himanshu (block)</p>
    </div>

    <h2>display - inline</h2>
    <span class="box1">Himanshu (inline)</span>
    <span class="box1">Himanshu (inline)</span>
    <span class="box1">Himanshu (inline)</span>

    <h2>display - inline- block</h2>
    <span class="box2">Himanshu (inline-block)</span>
    <span class="box2">Himanshu (inline-block)</span>
    <span class="box2">Himanshu (inline-block)</span>

    <div>himanshu</div>
    <div>himanshu</div>
  </body>
</html>
