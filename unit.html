<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* absolute unit  ex : px, mm, cm,in */
      #div1 {
        background-color: red;
        width: 500px;
        height: 100px;
      }
      /* percentange unit ex %  */
      #div2 {
        background-color: aqua;
        width: 10%;
        height: 10%;
      }

      /* relative unit  to viewpoint size ex vw , vh  */
      #para {
        background-color: aqua;
        width: 20vw;
        height: 30vh;
      }
    </style>
  </head>
  <body>
    <h1>Unit in Css tutorial</h1>
    <div id="div1">
      <div id="div2"></div>
    </div>

    <p id="para">Himanshu kumar</p>
  </body>
</html>
