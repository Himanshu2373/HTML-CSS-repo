<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .grd {
        display: flex;
        margin: 10px;
      }
      .box1 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(blue, green);
        margin: 10px;
      }
      .box2 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to right, blue, green);
        margin: 10px;
      }
      .box3 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to left, blue, green);
        margin: 10px;
      }
      .box4 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to top, blue, green);
        margin: 10px;
      }
      .box5 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to bottom, blue, green);
        margin: 10px;
      }
      .box6 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to bottom right, blue, green, red);
        margin: 10px;
      }
      .box7 {
        border: 2px solid black;
        width: 150px;
        height: 150px;
        background-image: linear-gradient(to top left, blue, green, red);
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Linear Gradient tutorial</h1>
    <div class="grd">
      <div class="box1">Linear Gradient default</div>
      <div class="box2">Linear Gradient to right</div>
      <div class="box3">Linear Gradient to left</div>
      <div class="box4">Linear Gradient to top</div>
      <div class="box5">Linear Gradient to bottom</div>
      <div class="box6">Linear Gradient to bottom right</div>
      <div class="box7">Linear Gradient to top left</div>
    </div>
  </body>
</html>
