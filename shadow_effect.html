<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .p1 {
        text-shadow: 2px 2px 2px blue;
      }

      .p2 {
        text-shadow: 2px 2px 2px blue, 5px 5px 5px red;
      }

      .p3 {
        background-color: aqua;
        width: 200px;
        height: 200px;
        box-shadow: 10px 10px 15px green;
        color: red;
      }
      .p4 {
        background-color: aqua;
        width: 200px;
        height: 200px;
        box-shadow: 0 0 0 5px green;
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Shadow effact tutorial</h1>
    <p class="p1">Hello world, I am Himanshu</p>
    <p class="p2">Hello world, Multiple text shadow effact</p>
    <div class="p3">
      <p>Hello world, I am Himanshu</p>
    </div>

    <div class="p4">
      <p>create border using shadow</p>
    </div>
  </body>
</html>
