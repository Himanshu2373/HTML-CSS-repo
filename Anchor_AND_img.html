<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- a is anchor tag that is used for line internal or external webpage here within anchor tag we use 
    href attribute where we can put url of webpage and another is target attribute that is used for 
    open webpage in new tab when we click on link (when target value is _blank) -->

    <a href="https://www.google.com" target="_blank">GOOGLE</a><br>
    <a href="https://www.github.com" target="_blank">github</a><br>
    <a href="https://www.facebook.com" target="_blank">facebook</a><br>
    <a href="https://www.linkedin.com" target="_blank">linkedin</a><br>
    <a href="https://www.instagram.com" target="_blank">instagram</a><br>

    <!-- img is a image tag that is used for insert image in webpage. here ,in which use  two attribute one is 
    src (source) where put path of image and another is alt (alternative) that is used when img is not upload
    then alt value display -->

    <img src="himanhsu.jpg" alt="img not upload">
    <img src="nature.jpg" alt="nature" width="300" height="200">
    <!-- we can also use width and height attribute but it is not a good way for styling  -->
</body>
</html>
