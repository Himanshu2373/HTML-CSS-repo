  <head>

    <title>Document</title>

      .box2 {

      }

      postition - sticky(img 1 is stick it stick only container or parent )

      <img src="nature.jpg" alt="poster2" />
      <img src="nature.jpg" alt="poster3" />
      <img src="nature.jpg" alt="poster4" />
    </div>
