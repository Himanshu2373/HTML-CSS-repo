<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advance Grid</title>
    <link rel="stylesheet" href="AdvGrid.css" />
  </head>
  <body>
    <h1>Using Grid-Area</h1>
    <div class="container">
      <div class="box" id="box1">box-1</div>
      <div class="box">box-2</div>
      <div class="box">box-3</div>
      <div class="box">box-4</div>
      <div class="box">box-5</div>
      <div class="box" id="box6">box-6</div>
    </div>

    <h1>Using Grid-Template Area</h1>
    <div class="container1">
      <div class="box1" id="hdr">header</div>
      <div class="box1" id="side">sidebar</div>
      <div class="box" id="main">main</div>
      <div class="box1" id="ftr">footer</div>
    </div>
  </body>
</html>
