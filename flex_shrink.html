<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container6 {
        width: 100%;
        height: 400px;
        border: 1px solid red;
        background-color: antiquewhite;
        display: flex;
        flex-direction: row;
      }
      .box1 {
        margin: 5px;
        padding: 20px;
        border: 1px solid black;
        height: 50px;
        width: 300px;
      }
      #box13 {
        background-color: aqua;
      }
      #box14 {
        background-color: blue;
      }
      #box15 {
        background-color: orange;
        flex-shrink: 3;
      }
      #box16 {
        background-color: brown;
      }

      #box1 {
        background-color: aqua;
      }
      #box2 {
        background-color: blue;
        align-self: flex-start;
      }
      #box3 {
        background-color: orange;
      }
      #box4 {
        background-color: brown;
      }
    </style>
  </head>
  <body>
    <h2>flex shrink</h2>
    <div class="container6">
      <div class="box1" id="box13">box-1</div>
      <div class="box1" id="box14">box-2</div>
      <div class="box1" id="box15">box-3</div>
      <div class="box1" id="box16">box-4</div>
    </div>

    <h2>align self</h2>
    <div class="container6">
      <div class="box1" id="box1">box-1</div>
      <div class="box1" id="box2">box-2</div>
      <div class="box1" id="box3">box-3</div>
      <div class="box1" id="box4">box-4</div>
    </div>
  </body>
</html>
