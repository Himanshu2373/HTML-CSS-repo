<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      table,
      tr,
      td,
      th {
        border: 1px solid black;
        /* collapse multiple line in single line */
        border-collapse: collapse;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- tags : 
     <table></table>   : use to create table
    <tr></tr>              : use to create row
    <td></td>              : use to create data
    <thead></thead>        : use to create head of table
    <th></th>              : use to create head of table in bold text
    <tbody></tbody>        : used for table body
    <caption></caption>    : used for table caption
    <tfoot></tfoot>        : used for table footer -->

    <table>
      <caption>
        My first saving
      </caption>
      <thead>
        <tr>
          <th>Month</th>
          <th>Saving</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>January</td>
          <td>100</td>
        </tr>
        <tr>
          <td>February</td>
          <td>300</td>
        </tr>
        <tr>
          <td>March</td>
          <td>400</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td>Total</td>
          <td>800</td>
        </tr>
      </tfoot>
    </table>
    <br />
    <br /><br />

    <!-- rowspan and colspan  -->

    <h1>Rowspan and colspan tutorial</h1>
    <table>
      <caption>
        My first saving
      </caption>
      <tr>
        <td colspan="2">ram</td>

        <td>ram</td>
      </tr>
      <tr>
        <td>ram</td>
        <td rowspan="3">ram</td>
        <td>ram</td>
      </tr>
      <tr>
        <td>ram</td>
        <!-- <td>ram</td> -->
        <td>ram</td>
      </tr>
      <tr>
        <td>ram</td>
        <!-- <td>ram</td> -->
        <td>ram</td>
      </tr>
      <tr>
        <td>ram</td>
        <td>ram</td>
        <td>ram</td>
      </tr>
    </table>
  </body>
</html>
