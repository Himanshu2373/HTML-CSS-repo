<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        position: relative;
        border: 2px solid red;
      }
      .box1 {
        border: 2px solid red;
        background-color: aqua;
      }

      img {
        width: 100px;
        height: 150px;
        margin: 10px;
      }

      .img2 {
        position: relative;
        top: 100px;
      }
      .img3 {
        position: absolute;
        top: 70px;
        left: 200px;
      }

      .img4 {
        position: fixed;
      }
    </style>
  </head>
  <body>
    <h2>postition - fixed(img 4 is fixed)</h2>
    <div class="box1">
      <img src="nature.jpg" alt="poster1" />
      <img src="nature.jpg" alt="poster2" />
      <img src="nature.jpg" alt="poster3" />
      <img src="nature.jpg" alt="poster4" class="img4" />
    </div>

    <h2>postition - static (by default)</h2>
    <div class="box">
      <img src="nature.jpg" alt="poster1" />
      <img src="nature.jpg" alt="poster2" />
      <img src="nature.jpg" alt="poster3" />
      <img src="nature.jpg" alt="poster4" />
    </div>

    <h2>postition - relative (set left, right, top, bottom)</h2>

    <div class="box">
      <img src="nature.jpg" alt="poster1" />
      <img src="nature.jpg" alt="poster2" class="img2" />
      <img src="nature.jpg" alt="poster3" />
      <img src="nature.jpg" alt="poster4" />
    </div>
    <br /><br /><br /><br />
    <h2>postition - absolute (set left, right, top, bottom)</h2>

    <div class="box">
      <img src="nature.jpg" alt="poster1" />
      <img src="nature.jpg" alt="poster2" />
      <img src="nature.jpg" alt="poster3" class="img3" />
      <img src="nature.jpg" alt="poster4" />
    </div>

    <br /><br /><br /><br /><br /><br />
  </body>
</html>
