<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        height: 200px;
        width: 200px;
        border: 5px solid black;
        /* margin use to create space between two div border or elements border  */
        margin: 10px;
        /* padding use to create space between border and content  */
        padding: 50px;
      }
      #org {
        background-color: orange;
      }
      #wht {
        background-color: white;
      }
      #grn {
        background-color: green;
      }
    </style>
  </head>
  <body>
    <h1>Box model tutorial</h1>
    <div class="box" id="org">A</div>
    <div class="box" id="wht">B</div>
    <div class="box" id="grn">C</div>
  </body>
</html>
